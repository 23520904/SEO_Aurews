<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://aurews.id.vn/404.html" />
  <title>Page Not Found - Aurews</title>
  <meta name="description"
    content="The page you are looking for does not exist or has been moved. Return to Aurews for the latest news and stories.">
  <meta name="robots" content="noindex, follow">
  <meta property="og:title" content="404 - Page Not Found | Aurews">
  <meta property="og:description"
    content="The page you are looking for does not exist. Return to Aurews for the latest news.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aurews.id.vn/404.html">
  <link rel="stylesheet" href="assets/css/general.css">
  <link rel="stylesheet" href="assets/css/404.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
  <!-- Overlay cho đăng nhập đăng xuất va pop up -->
  <div id="page-overlay"></div>
  <div id="pop-up-overlay__placeholder"></div>

  <!-- Nội dung chính -->
  <div id="mainContent">
    <!-- || HEADER -->
    <header>
      <div id="navbar__placeholder"></div>
      <div id="mobile-menu__placeholder"></div>
    </header>
    <main>
      <section class="error-page" id="error-page">
        <div class="error-page__code" aria-hidden="true">404</div>
        <hr class="error-page__divider">
        <h1 class="error-page__title">Page Not Found</h1>
        <p class="error-page__message">
          Sorry, the page you're looking for doesn't exist or has been moved.
          Let's get you back to the latest news and stories.
        </p>
        <div class="error-page__actions">
          <a href="index.html" class="error-page__btn error-page__btn--primary" id="btn-go-home">
            <i class="fa-solid fa-house"></i> Back to Home
          </a>
          <a href="search.html" class="error-page__btn error-page__btn--secondary" id="btn-search">
            <i class="fa-solid fa-magnifying-glass"></i> Search Articles
          </a>
        </div>
        <nav class="error-page__suggestions" aria-label="Suggested pages">
          <p class="error-page__suggestions-title">Or try these pages</p>
          <div class="error-page__links">
            <a href="category.html?type=Latest" class="error-page__link">Categories</a>
            <a href="about.html" class="error-page__link">About Us</a>
            <a href="contact.html" class="error-page__link">Contact</a>
          </div>
        </nav>
      </section>
    </main>
    <div id="footer__placeholder"></div>
  </div>
  <script type="module" src="components/Navbar/Navbar.js"></script>
  <script type="module" src="components/PopUpOverlay/PopUpOverlay.js"></script>
  <script type="module" src="components/MobileMenu/MobileMenu.js"></script>
  <script type="module" src="components/Footer/Footer.js"></script>
