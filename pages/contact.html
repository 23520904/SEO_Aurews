      "telephone": "+840123456789",
      "sameAs": [
        "https://facebook.com/aurew.fb",

  <link rel="stylesheet" href="../assets/css/general.css">
  <link rel="stylesheet" href="../assets/css/contact.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
  <div id="page-overlay"></div>
  <div id="pop-up-overlay__placeholder"></div>

  <div id="mainContent">
    <header>
      <div id="navbar__placeholder"></div>
      <div id="mobile-menu__placeholder"></div>
    </header>
    <main>
      <div class="container">
        <!-- GET IN TOUCH -->
        <div class="left-section">
          <h1>Get in touch</h1>
          <p>
            To find out more about how our content and services can help your organization
          </p>
          <div class="contact-info">
            <div class="contact-item">
              <div class="icon"><i class="fab fa-facebook-f"></i></div>
              <div>/aurew.fb</div>
            </div>
            <div class="contact-item">
              <div class="icon"><i class="fab fa-instagram"></i></div>
              <div>/aurew.ig</div>
            </div>
            <div class="contact-item">
              <div class="icon"><i class="fab fa-x-twitter"></i></div>
              <div>/aurew.x</div>
            </div>
            <div class="contact-item">
              <div class="icon"><i class="fab fa-youtube"></i></div>
              <div>/aurew.yt</div>
            </div>
            <div class="contact-item">
              <div class="icon"><i class="fa-solid fa-envelope"></i></div>
              <div><a href="mailto:aurew@gmail.com" style="color:inherit;">aurew@gmail.com</a></div>
            </div>
            <div class="contact-item">
              <div class="icon"><i class="fa-solid fa-phone"></i></div>
              <div><a href="tel:+840123456789" style="color:inherit;">0123456789</a></div>
            </div>
          </div>

          <!-- ========== Internal Links ========== -->
          <nav aria-label="Quick links" style="margin-top:2rem; font-size:0.9rem;">
            <p style="font-weight:600; margin-bottom:0.5rem;">Explore Aurews:</p>
            <a href="index.html" style="display:block; margin-bottom:0.3rem;">← Back to Home</a>
            <a href="about.html" style="display:block; margin-bottom:0.3rem;">About Us</a>
            <a href="category.html?cat=Business News" style="display:block; margin-bottom:0.3rem;">Business News</a>
            <a href="category.html?cat=A.I." style="display:block; margin-bottom:0.3rem;">AI & Technology</a>
          </nav>
        </div>

        <!-- CONTACT FORM -->
        <div class="right-section">
          <form id="contactForm">
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name <span>*</span></label>
                <input type="text" id="firstName" name="firstName" autocomplete="given-name" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name <span>*</span></label>
                <input type="text" id="lastName" name="lastName" autocomplete="family-name" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="company">Company <span>*</span></label>
                <input type="text" id="company" name="company" autocomplete="organization" required>
              </div>
              <div class="form-group">
                <label for="companyType">Company type <span>*</span></label>
                <select id="companyType" name="companyType" required>
                  <option value="">Select...</option>
                  <option value="startup">Startup</option>
                  <option value="enterprise">Enterprise</option>
                  <option value="agency">Agency</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="workEmail">Work Email <span>*</span></label>
                <input type="email" id="workEmail" name="workEmail" autocomplete="email" required>
              </div>
              <div class="form-group phone-wrapper">
                <label for="workPhone">Work Phone <span>*</span></label>
                <div class="phone-input">
                  <div class="country-code">
                    <span class="flag">🇻🇳</span>
                    <span>+84</span>
                  </div>
                  <input type="tel" id="workPhone" name="workPhone" placeholder="123-456-7890" autocomplete="tel" required>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label for="country">Country <span>*</span></label>
              <select id="country" name="country" autocomplete="country" required>
                <option value="">Select country...</option>
                <option value="vn">Vietnam</option>
                <option value="us">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="sg">Singapore</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="contactReason">Reason for contacting us: <span>*</span></label>
              <input type="text" id="contactReason" name="contactReason" required>
            </div>
            <div class="form-group">
              <label for="contactMessage">Tell us more about your needs so we can get back to you: <span>*</span></label>
              <textarea id="contactMessage" name="contactMessage" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
          </form>
        </div>
      </div>
    </main>
    <div id="footer__placeholder"></div>
  </div>

  <script type="module" src="../components/Navbar/Navbar.js"></script>
  <script src="../components/PopUpOverlay/PopUpOverlay.js"></script>
  <script type="module" src="../components/Footer/Footer.js"></script>
  <script type="module" src="../components/MobileMenu/MobileMenu.js"></script>
  <script type="module" src="../assets/js/header.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/overlay.js"></script>
</body>

</html>
